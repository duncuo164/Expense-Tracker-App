on:
  push:
    branches:
      - "master"
    
env:
  DOCKER_IMAGE_NAME: express-js-dev-pipeline

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: PIPELINE_ENV
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Using Commit SHA 
        run: |
          echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Show the SHA values 
        run: |
          echo "TAG = ${{env.TAG }}"

      - name: Login to Dockerhub 
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin

      - name: Build and Tag 
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }} .

      - name: Trivy scan — table output (informational)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }}
          format: table
          exit-code: "0"         
          ignore-unfixed: true   
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy scan — SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy scan — block on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }}
          format: table
          exit-code: "1"        
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL 
 
      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()             
        with:
          name: trivy-scan-report
          path: trivy-results.sarif
          retention-days: 30
 
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Push to Dockerhub 
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }}

      - name: Logout from Dockerhub 
        if: always()
        run: |
          docker logout