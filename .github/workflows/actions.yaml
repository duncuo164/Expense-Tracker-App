on:
  push:
    branches:
      - "master"
    
env:
  DOCKER_IMAGE_NAME: express-js-dev-pipeline

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: PIPELINE_ENV
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v3
      - name: Using Commit SHA 
        run: |
          echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
      - name: Show the SHA values 
        run: |
          echo "TAG = ${{env.TAG }}"
      - name: Login to Dockerhub 
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin
      - name: Build and Tag 
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }} .
      - name: Push to Dockerhub 
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{env.TAG }}
      - name: Logout from Dockerhub 
        if: always()
        run: |
          docker logout